<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUA Seruyan Raya - Layanan Digital</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        img.logo {
            width: 80px;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .link-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            background-color: #1b5e20; /* Warna Hijau Khas Kemenag */
            color: white;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .link-btn:hover {
            background-color: #2e7d32;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo Kemenag -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/archive/b/b2/20220309033405%21Logo_Kementerian_Agama.png" alt="Logo Kemenag" class="logo">
        
        <h1>KUA Seruyan Raya</h1>
        <p class="subtitle">Pusat Layanan Keagamaan & Pernikahan</p>

        <div class="link-wrapper">
            <!-- GANTI LINK DI BAWAH INI SESUAI KEBUTUHAN -->
            <a href="https://wa.me/628123456789" target="_blank" class="link-btn">💬 Konsultasi via WhatsApp</a>
            <a href="https://simkah4.kemenag.go.id/" target="_blank" class="link-btn">💍 Daftar Nikah Online (SIMKAH)</a>
            <a href="https://maps.app.goo.gl/xxxx" target="_blank" class="link-btn">📍 Lokasi Kantor KUA</a>
            <a href="#" class="link-btn">📜 Alur & Syarat Nikah</a>
            <a href="https://kemenag.go.id" target="_blank" class="link-btn">🌐 Website Kemenag RI</a>
        </div>

        <div class="footer">
            &copy; 2024 KUA Seruyan Raya <br> Kab. Seruyan, Kalimantan Tengah
        </div>
    </div>

</body>
</html>
